name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust Backend ────────────────────────────────────────────────────────
  rust-check:
    name: Rust – fmt, clippy, test, build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: soroban_registry_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/soroban_registry_test
      JWT_SECRET: ci-test-secret-at-least-32-chars-long
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
            soroban-registry/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting (backend)
        working-directory: backend
        run: cargo fmt --all -- --check

      - name: Check formatting (soroban-registry)
        working-directory: soroban-registry
        run: cargo fmt --all -- --check

      - name: Clippy (backend)
        working-directory: backend
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (soroban-registry)
        working-directory: soroban-registry
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests (backend)
        working-directory: backend
        run: cargo test --all

      - name: Run tests (soroban-registry)
        working-directory: soroban-registry
        run: cargo test --all

      - name: Build release (backend API)
        working-directory: backend
        run: cargo build --release --bin api

  # ── Frontend ────────────────────────────────────────────────────────────
  frontend:
    name: Frontend – lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test --ci --passWithNoTests

      - name: Build
        run: pnpm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

  # ── Security Audit ─────────────────────────────────────────────────────
  security-audit:
    name: Dependency security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked || true

      - name: Rust audit (backend)
        working-directory: backend
        run: cargo audit || true
        continue-on-error: true

      - name: Rust audit (soroban-registry)
        working-directory: soroban-registry
        run: cargo audit || true
        continue-on-error: true

      - name: npm audit (frontend)
        working-directory: frontend
        run: npm audit --omit=dev || true
        continue-on-error: true

  # ── Docker Build ───────────────────────────────────────────────────────
  docker-build:
    name: Docker production build
    runs-on: ubuntu-latest
    needs: [rust-check, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build -t soroban-registry:ci-${{ github.sha }} .

  # ── Migration Validation ───────────────────────────────────────────────
  check-migrations:
    name: Validate migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check migration ordering
        run: |
          echo "Checking migration file ordering..."
          prev=""
          for f in database/migrations/*.sql; do
            base=$(basename "$f")
            if [ -n "$prev" ] && [[ "$base" < "$prev" ]]; then
              echo "ERROR: Migration $base is out of order (after $prev)"
              exit 1
            fi
            prev="$base"
          done
          echo "✓ All $(ls database/migrations/*.sql | wc -l) migrations in order"